<div class="container">
    <div class="card">
        <h1>Compose Email....</h1>
        <form (ngSubmit)="doSubmitForm()">
            <mat-form-field class="filled" appearance="outline">
                <mat-label>To</mat-label>
                <input name="to" [(ngModel)]="data.to" matInput>
            </mat-form-field>
            <mat-form-field class="filled" appearance="outline">
                <mat-label>Subject</mat-label>
                <input name="subject" [(ngModel)]="data.subject" matInput>
            </mat-form-field>

            <mat-form-field class="example-full-width filled">
                <mat-label>Enter Your Message</mat-label>
                <textarea name="message" [(ngModel)]="data.message" rows="15" matInput placeholder="Ex. It makes me feel..."></textarea>
            </mat-form-field>

            <div class="text-center">
                <mat-spinner *ngIf="flag" class="spinner"></mat-spinner>

                <button [disabled]="flag" type="submit" mat-raised-button color="primary">Submit</button>
                <button type="reset" mat-raised-button color="accent">Reset</button>
            </div>
        </form>

        <!-- {{ data | json }} -->
    </div>
</div>
